# ==========================================================================
# ATOMIC ARTSCI — Library Definitions for New Blocks
# ==========================================================================
#
# ADD these to your existing atomic_artsci.libraries.yml.
#
# Architecture:
#   - Global CSS (main.css) contains: abstracts, base, layout, utilities
#   - Component CSS is loaded per-template via {{ attach_library() }}
#   - Each component library maps to one SCSS partial → one CSS file
#
# CSS file paths assume compilation outputs to: assets/css/
# JS file paths: assets/js/
# ==========================================================================


# ==========================================================================
# GLOBAL — loaded on every page (already have this, update if needed)
# ==========================================================================
# global-styles:
