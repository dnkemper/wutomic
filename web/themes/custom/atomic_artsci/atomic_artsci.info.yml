name: Atomic Artsci
type: theme
base theme: classy
description: A flexible theme with a responsive, mobile-first layout.
package: Custom
core_version_requirement: ^11 || ^12
dependencies:
  - classy:classy
libraries-override:
  classy/base: false
  superfish/superfish_touchscreen: atomic_artsci/sftouchscreen
libraries-extend:
  core/drupal.message:
    - atomic_artsci/message
libraries:
  - atomic_artsci/global-styling
regions:
  under_search: 'Under search'
  page_top: 'Page top'
  header: 'Header'
  alert: 'Alert'
  action_menu: 'Action menu'
  primary_menu: 'Primary menu'
  secondary_menu: 'Secondary menu'
  search: 'Search'
  featured: 'Featured'
  breadcrumb: 'Breadcrumb'
  content: 'Content'
  sidebar_first: 'Sidebar first'
  sidebar_second: 'Sidebar second'
  after_content: 'After content'
  pre_footer: 'Pre-footer'
  footer_first: 'Footer under logo'
  footer_second: 'Footer menus'
  page_bottom: 'Page bottom'
# Ckeditor styling for lead paragraphs and alerts
ckeditor5-stylesheets:
  - assets/css/components/video/video-utilities.css
  - assets/css/artsci_wysiwyg.css
  - https://fonts.googleapis.com/css2?family=Antonio:wght@100;300;700
  - https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400
  - https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@300;400;500;600;700
