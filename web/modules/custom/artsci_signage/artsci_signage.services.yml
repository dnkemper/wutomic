services:
  artsci_signage.mazevo_api_client:
    class: Drupal\artsci_signage\MazevoApiClient
    arguments: ['@http_client', '@logger.channel.artsci_signage', '@cache.artsci_signage', '@config.factory']
  logger.channel.artsci_signage:
    parent: logger.channel_base
    arguments: [ 'artsci_signage' ]
  cache.artsci_signage:
    class: Drupal\Core\Cache\CacheBackendInterface
    tags:
      - { name: cache.bin }
    factory: cache_factory:get
    arguments: ['artsci_signage']
