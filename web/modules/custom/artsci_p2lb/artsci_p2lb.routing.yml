artsci_p2lb.settings_form:
  path: '/admin/config/artsci/p2lb'
  defaults:
    _title: 'P2Lb'
    _form: '\Drupal\artsci_p2lb\Form\P2LbSettingsForm'
  requirements:
    _permission: 'administer artsci p2lb'

artsci_p2lb.content_converter:
  path: '/admin/content/artsci-converter'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::overview'
    link_id: 'artsci_p2lb.content_converter'
    _title: 'Artsci Converter'
  requirements:
    _permission: 'administer basic site settings'

artsci_p2lb.content_converted:
  path: '/admin/content/artsci-converter/converted'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::overview'
    link_id: 'artsci_p2lb.content_converted'
    _title: 'Converted'
  requirements:
    _permission: 'administer basic site settings'

entity.node.p2lb_conversion_status:
  path: '/node/{node}/conversion-status'
  defaults:
    _title: 'V3 Status'
    _controller: '\Drupal\artsci_p2lb\Controller\P2LbController::status'
  requirements:
    _entity_access: 'node.view all revisions'
    node: \d+
  options:
    _node_operation_route: TRUE
    parameters:
      node:
        type: entity:node
