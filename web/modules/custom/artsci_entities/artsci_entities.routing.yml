entity.artsci_academic_unit.collection:
  path: '/admin/structure/artsci-academic-unit'
  defaults:
    _entity_list: 'artsci_academic_unit'
    _title: 'Academic unit configuration'
  requirements:
    _permission: 'administer artsci_academic_unit'

entity.artsci_academic_unit.add_form:
  path: '/admin/structure/artsci-academic-unit/add'
  defaults:
    _entity_form: 'artsci_academic_unit.add'
    _title: 'Add an academic unit'
  requirements:
    _permission: 'administer artsci_academic_unit'

entity.artsci_academic_unit.edit_form:
  path: '/admin/structure/artsci-academic-unit/{artsci_academic_unit}'
  defaults:
    _entity_form: 'artsci_academic_unit.edit'
    _title: 'Edit an academic unit'
  requirements:
    _permission: 'administer artsci_academic_unit'

entity.artsci_academic_unit.delete_form:
  path: '/admin/structure/artsci-academic-unit/{artsci_academic_unit}/delete'
  defaults:
    _entity_form: 'artsci_academic_unit.delete'
    _title: 'Delete an academic unit'
  requirements:
    _permission: 'administer artsci_academic_unit'

artsci_entities.settings_form:
  path: '/admin/config/artsci/artsci-entities'
  defaults:
    _title: 'Artsci Entities'
    _form: 'Drupal\artsci_entities\Form\SettingsForm'
  requirements:
    _permission: 'administer artsci_entities'
