services:
  artsci_facilities.bizhub_api_client:
    class: Drupal\artsci_facilities\BizHubApiClient
    arguments: ['@http_client', '@logger.channel.artsci_facilities', '@cache.artsci_facilities', '@config.factory']
  artsci_facilities.utility_alerts_api_client:
    class: Drupal\artsci_facilities\UtilityAlertsApiClient
    arguments: ['@http_client', '@logger.channel.artsci_facilities', '@cache.artsci_facilities', '@config.factory']
  artsci_facilities.buildui_api_client:
    class: Drupal\artsci_facilities\BuildUiApiClient
    arguments: ['@http_client', '@logger.channel.artsci_facilities', '@cache.artsci_facilities', '@config.factory']
  logger.channel.artsci_facilities:
    parent: logger.channel_base
    arguments: [ 'artsci_facilities' ]
  cache.artsci_facilities:
    class: Drupal\Core\Cache\CacheBackendInterface
    tags:
      - { name: cache.bin }
    factory: cache_factory:get
    arguments: ['artsci_facilities']
