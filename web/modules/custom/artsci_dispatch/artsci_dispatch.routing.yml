artsci_dispatch.settings_form:
  path: '/admin/config/artsci/artsci-dispatch'
  defaults:
    _title: 'Artsci Dispatch'
    _form: 'Drupal\artsci_dispatch\Form\SettingsForm'
  requirements:
    _permission: 'administer artsci_dispatch configuration'

artsci_dispatch.thanks:
  path: '/admin/config/artsci/artsci-dispatch/thanks'
  defaults:
    _title: 'Thank You form settings'
    _form: 'Drupal\artsci_dispatch\Form\ThankYouSettingsForm'
  requirements:
    _permission: 'administer artsci_dispatch configuration'
