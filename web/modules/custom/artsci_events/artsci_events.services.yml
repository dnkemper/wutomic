services:
  artsci_events.content_hub_api_client:
    class: Drupal\artsci_events\ContentHubApiClient
    arguments: [ '@http_client', '@logger.channel.artsci_events', '@cache.artsci_events', '@config.factory' ]
  logger.channel.artsci_events:
    parent: logger.channel_base
    arguments: [ 'artsci_events' ]
  cache.artsci_events:
    class: Drupal\Core\Cache\CacheBackendInterface
    tags:
      - { name: cache.bin }
    factory: cache_factory:get
    arguments: [ 'artsci_events' ]
