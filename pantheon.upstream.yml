api_version: 1
web_docroot: true
enforce_https: transitional
php_version: 8.3
database:
  version: 10.6
drush_version: 13
build_step: true
protected_web_paths:
  - /private/
  - /sites/default/files/private/
  - /sites/default/files/config/

# Quicksilver Workflows
# Inherited by ALL sites connected to this upstream.
# NOTE: Scripts live at web/private/scripts/quicksilver/ on disk,
# but paths here must NOT include the web/ prefix — Pantheon resolves
# relative to the web docroot automatically when web_docroot: true.
workflows:

  # Fires when code is pushed to dev (git push or dashboard commit)
  sync_code:
    after:
      - type: webphp
        description: "Clear Drupal caches after code sync"
        script: private/scripts/quicksilver/clear_cache.php

  # Fires when a database is cloned between environments
  clone_database:
    after:
      - type: webphp
        description: "Run DB updates after clone"
        script: private/scripts/quicksilver/db_updates.php
      - type: webphp
        description: "Import config splits after clone"
        script: private/scripts/quicksilver/config_splits_import.php
      - type: webphp
        description: "Clear all caches"
        script: private/scripts/quicksilver/clear_cache.php
  # Fires on deploy (dev→test or test→live via dashboard or Terminus)
  deploy:
    after:
      - type: webphp
        description: "Run database updates"
        script: private/scripts/quicksilver/db_updates.php
      - type: webphp
        description: "Import configuration"
        script: private/scripts/quicksilver/config_import.php
      - type: webphp
        description: "Clear all caches"
        script: private/scripts/quicksilver/clear_cache.php

  # Fires after upstream updates are applied
  deploy_product:
    after:
      - type: webphp
        description: "Run updatedb + config:import + cache:rebuild after upstream update"
        script: private/scripts/quicksilver/upstream_updates.php
