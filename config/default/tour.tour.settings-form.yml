uuid: 90edbf61-aa60-4458-9593-e7d4b366a9f0
langcode: en
status: true
dependencies:
  module:
    - artsci
    - artsci_articles
id: settings-form
label: 'Settings Form'
routes:
  -
    route_name: artsci_articles.settings_form
tips:
  intro:
    id: intro
    plugin: text
    label: 'Artsci Article Settings'
    weight: 0
    body: '<p>On this page you can change many of the Artsci Article settings available to you. Let''s step through them.</p><p>For more information about Artsci Articles, <a href="https://artsci.artsci.edu/node/36">view our documentation</a>.</p>'
  checkbox:
    id: checkbox
    plugin: text
    label: Enable/Disable
    weight: 1
    selector: .form-checkbox
    body: '<p>Toggling the "Enabled" checkbox for Artsci Articles, will display/not display published articles at the configurable path below.</p>'
  title:
    id: title
    plugin: text
    label: 'Articles Title'
    weight: 2
    position: bottom-start
    selector: '#edit-artsci-articles-title'
    body: '<p>First off, you can give your Article page a title. This is a required field. Other required fields are marked with a red asterisk. This will display above the published articles.</p>'
  path:
    id: path
    plugin: text
    label: 'Articles Path'
    weight: 3
    position: bottom-start
    selector: '#edit-artsci-articles-path'
    body: '<p>The path where the published articles will be displayed. The default path is YourSiteURL/news)</p>'
  header:
    id: header
    plugin: text
    label: 'Header Content'
    weight: 4
    position: top-start
    selector: .js-form-type-textarea
    body: '<p>The Header Content text will display above the rendered articles on the news page.</p>'
  wysiwyg:
    id: wysiwyg
    plugin: text
    label: 'Text Editor (WYSIWYG) Overview'
    weight: 5
    position: top-start
    selector: '#cke_edit-artsci-articles-header-content-value'
    body: '<p>The What-You-See-Is-What-You-Get (WYSIWYG) text editor gives you the ability to add additional content to the header on the Articles page.</p><p>For more details, <a href="https://artsci.artsci.edu/node/136">view our documentation section about the WYSIWYG</a>.</p>'
  archive:
    id: archive
    plugin: text
    label: Archive
    weight: 6
    selector: '#edit-artsci-articles-archive'
    body: '<p>Toggling the "Enabled" checkbox for Display monthly archive, will display/hide the menu that allows site visitors to see a monthly archive listing.</p>'
  rss:
    id: rss
    plugin: text
    label: 'RSS Feed'
    weight: 7
    selector: '#edit-artsci-articles-feed'
    body: '<p>Toggling the "Enabled" checkbox for the RSS Feed icon, will display/hide the icon below the articles for site visitors.</p>'
  page-actions:
    id: page-actions
    plugin: text
    label: 'Save Article Settings'
    weight: 8
    position: top-start
    selector: '#edit-actions'
    body: '<p>You can Save the changes you made to the Article configuration here.</p>'
  next-step:
    id: next-step
    plugin: text
    label: 'Where to next?'
    weight: 9
    body: '<p><a href="/node/add/article?tour=1" class="button button--primary">Article Content Overview</a></p> Checkout our <a href="//artsci.artsci.edu/node/126" >Artsci Article Documentation</a> for more information.</p>'
